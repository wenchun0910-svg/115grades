<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學生成績查詢系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@400;600;700&display=swap');
        
        :root {
            --wafu-bg: #F5F4F0;      /* 和紙白 */
            --wafu-text: #3E3A39;    /* 墨色 */
            --wafu-primary: #78866B; /* 鶯茶 (抹茶綠) */
            --wafu-primary-hover: #5A664F; 
            --wafu-accent: #B48178;  /* 鴇色 (淺褐紅) */
            --wafu-border: #DCD6CD;  /* 淺灰 */
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--wafu-bg);
            color: var(--wafu-text);
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
        }

        h1, h2, h3, .serif-font { font-family: 'Noto Serif TC', serif; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .loader {
            border-top-color: var(--wafu-bg);
            border-left-color: var(--wafu-bg);
            -webkit-animation: spinner 1s linear infinite;
            animation: spinner 1s linear infinite;
        }

        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .fade-in { animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .zen-card {
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid var(--wafu-border);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.05);
            border-radius: 4px;
        }

        .btn-wafu {
            background-color: var(--wafu-primary);
            color: #fff;
            border-radius: 3px;
            transition: all 0.3s ease;
        }
        .btn-wafu:hover:not(:disabled) { background-color: var(--wafu-primary-hover); transform: translateY(-1px); }
        .btn-wafu:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .btn-wafu-danger {
            background-color: var(--wafu-accent);
            color: #fff;
            border-radius: 3px;
            transition: all 0.3s ease;
        }
        .btn-wafu-danger:hover:not(:disabled) { filter: brightness(0.9); }

        .hanko-stamp {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            border: 2px solid var(--wafu-accent);
            border-radius: 4px;
            color: var(--wafu-accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Noto Serif TC', serif;
            font-weight: 700;
            font-size: 14px;
            line-height: 1.1;
            writing-mode: vertical-rl;
            opacity: 0.6;
            pointer-events: none;
        }
        
        .wafu-input {
            border: 1px solid var(--wafu-border);
            background-color: #FCFBFA;
            border-radius: 3px;
            transition: border-color 0.2s;
        }
        .wafu-input:focus {
            outline: none;
            border-color: var(--wafu-primary);
            box-shadow: 0 0 0 2px rgba(120, 134, 107, 0.2);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- 主容器 -->
    <div class="w-full max-w-2xl zen-card overflow-hidden fade-in relative">
        <div class="hanko-stamp">成績</div>

        <div class="p-8 sm:p-12">
            <!-- 標題區 -->
            <div class="text-center mb-10 mt-4">
                <div class="inline-flex items-center justify-center mb-6">
                    <svg class="w-12 h-12" style="color: var(--wafu-primary);" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                </div>
                <h1 class="text-3xl sm:text-4xl font-bold tracking-widest text-[#3E3A39] serif-font">平時成績查詢</h1>
                <p id="subtitle" class="text-gray-500 mt-4 text-sm sm:text-base tracking-wide">系統連線中，請稍候...</p>
            </div>

            <!-- ================= 視圖一：登入表單 ================= -->
            <form id="loginForm" class="space-y-6 max-w-sm mx-auto hidden">
                <div>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fas fa-key text-gray-400"></i>
                        </div>
                        <input type="password" id="password" name="password" required placeholder="請輸入密碼" 
                            class="block w-full pl-12 pr-4 py-4 wafu-input text-center text-lg tracking-widest">
                    </div>
                    <p class="text-xs text-center text-gray-400 mt-3">※ 學生與管理員皆於此輸入對應密碼</p>
                </div>

                <button type="submit" id="loginBtn" class="w-full flex justify-center items-center py-4 px-4 btn-wafu font-medium tracking-widest text-lg">
                    <span id="loginBtnText">登 入</span>
                    <div id="loginSpinner" class="hidden ml-3 loader border-2 border-white rounded-full w-5 h-5"></div>
                </button>
            </form>

            <!-- ================= 視圖二：學生儀表板 ================= -->
            <div id="studentSection" class="hidden fade-in space-y-8">
                <div class="border-b border-[var(--wafu-border)] pb-4 flex items-center justify-between">
                    <div>
                        <p class="text-xs text-gray-500 tracking-wider mb-1">學生身分</p>
                        <p class="font-bold text-xl serif-font text-[var(--wafu-text)]">
                            <span id="resSeat" class="mr-3 border-r border-[var(--wafu-border)] pr-3"></span>
                            <span id="resName"></span>
                        </p>
                    </div>
                    <button type="button" onclick="logout()" class="text-sm text-gray-500 hover:text-[var(--wafu-accent)] transition-colors px-3 py-2">
                        <i class="fas fa-sign-out-alt mr-1"></i>登出
                    </button>
                </div>

                <form id="queryForm" class="bg-[#FCFBFA] p-6 rounded border border-[var(--wafu-border)] space-y-4 relative">
                    <label class="block text-sm font-medium text-[var(--wafu-text)] mb-2 serif-font">選擇評量項目</label>
                    <div class="relative">
                        <select id="assessment" name="assessment" required class="block w-full pl-4 pr-10 py-3 wafu-input appearance-none">
                            <option value="" disabled selected>請選擇...</option>
                        </select>
                        <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none"><i class="fas fa-angle-down text-gray-400"></i></div>
                    </div>
                    <button type="submit" id="queryBtn" class="w-full flex justify-center items-center py-3 px-4 btn-wafu font-medium tracking-wider mt-4">
                        <span id="queryBtnText">查詢成績</span>
                        <div id="querySpinner" class="hidden ml-2 loader border-2 border-white rounded-full w-4 h-4"></div>
                    </button>
                </form>

                <div id="resultArea" class="hidden pt-4 fade-in">
                    <h3 class="font-bold text-lg mb-4 serif-font border-l-4 pl-3" style="border-color: var(--wafu-primary);">成績明細</h3>
                    <div class="overflow-hidden border border-[var(--wafu-border)] rounded-sm">
                        <table class="min-w-full divide-y divide-[var(--wafu-border)]">
                            <thead class="bg-[#F5F4F0]">
                                <tr>
                                    <th scope="col" class="px-6 py-4 text-center text-sm font-bold text-gray-600 tracking-widest w-1/2 serif-font">科目</th>
                                    <th scope="col" class="px-6 py-4 text-center text-sm font-bold text-gray-600 tracking-widest w-1/2 serif-font">成績</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody" class="bg-white divide-y divide-[var(--wafu-border)]"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- ================= 視圖三：管理員儀表板 ================= -->
            <div id="adminSection" class="hidden fade-in space-y-8">
                <div class="border-b border-[var(--wafu-border)] pb-4 flex items-center justify-between">
                    <div>
                        <p class="text-xs text-[var(--wafu-primary)] tracking-wider mb-1 font-bold">系統管理員</p>
                        <p class="font-bold text-xl serif-font text-[var(--wafu-text)]">管理後台</p>
                    </div>
                    <button type="button" onclick="logout()" class="text-sm text-gray-500 hover:text-[var(--wafu-accent)] transition-colors px-3 py-2">
                        <i class="fas fa-sign-out-alt mr-1"></i>登出
                    </button>
                </div>

                <!-- 匯入學生名冊 -->
                <div class="bg-[#FCFBFA] p-6 rounded border border-[var(--wafu-border)]">
                    <h3 class="font-bold text-lg mb-4 serif-font border-l-4 pl-3" style="border-color: var(--wafu-primary);">
                        <i class="fas fa-users mr-2 text-sm"></i>1. 匯入學生名冊 (CSV)
                    </h3>
                    <div class="space-y-4">
                        <p class="text-xs text-gray-500">格式：第一列為標題，必須包含「密碼, 座號, 姓名」</p>
                        <input type="file" id="rosterCsvFile" accept=".csv" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-sm file:border-0 file:text-sm file:font-semibold file:bg-[#E8E6E1] file:text-[var(--wafu-text)] hover:file:bg-[#DCD6CD] transition-colors border border-[var(--wafu-border)] rounded-sm bg-white p-1">
                        <button type="button" id="importRosterBtn" onclick="handleImportRoster()" class="w-full flex justify-center items-center py-3 btn-wafu tracking-wider">
                            <span id="importRosterBtnText">上傳 / 覆寫名冊</span>
                            <div id="importRosterSpinner" class="hidden ml-2 loader border-2 border-white rounded-full w-4 h-4"></div>
                        </button>
                    </div>
                </div>

                <!-- 新增：學生基本資料管理 -->
                <div class="bg-[#FCFBFA] p-6 rounded border border-[var(--wafu-border)]">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="font-bold text-lg serif-font border-l-4 pl-3" style="border-color: var(--wafu-primary);">
                            <i class="fas fa-user-edit mr-2 text-sm"></i>2. 學生基本資料管理
                        </h3>
                        <button type="button" onclick="openStudentModal()" class="text-sm btn-wafu px-3 py-1 tracking-widest rounded-sm">
                            <i class="fas fa-plus mr-1"></i>新增學生
                        </button>
                    </div>
                    <div class="overflow-y-auto max-h-60 border border-[var(--wafu-border)] rounded-sm no-scrollbar">
                        <table class="min-w-full divide-y divide-[var(--wafu-border)] text-sm">
                            <thead class="bg-[#F5F4F0] sticky top-0 shadow-sm z-10">
                                <tr>
                                    <th class="px-4 py-2 text-left font-medium text-gray-600 tracking-wider">密碼(帳號)</th>
                                    <th class="px-4 py-2 text-left font-medium text-gray-600 tracking-wider">座號</th>
                                    <th class="px-4 py-2 text-left font-medium text-gray-600 tracking-wider">姓名</th>
                                    <th class="px-4 py-2 text-center font-medium text-gray-600 tracking-wider">操作</th>
                                </tr>
                            </thead>
                            <tbody id="adminStudentList" class="divide-y divide-[var(--wafu-border)] bg-white">
                                <tr><td colspan="4" class="text-center py-4 text-gray-500">載入中...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- 匯入成績功能 -->
                <div class="bg-[#FCFBFA] p-6 rounded border border-[var(--wafu-border)]">
                    <h3 class="font-bold text-lg mb-4 serif-font border-l-4 pl-3" style="border-color: var(--wafu-primary);">
                        <i class="fas fa-file-import mr-2 text-sm"></i>3. 匯入評量成績 (CSV)
                    </h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">評量名稱 (例如：第一學期第一次段考)</label>
                            <input type="text" id="importSheetName" class="w-full px-3 py-2 wafu-input">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">選擇 CSV 檔案 (第一列為標題，必須包含「密碼」與各科目)</label>
                            <input type="file" id="csvFile" accept=".csv" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-sm file:border-0 file:text-sm file:font-semibold file:bg-[#E8E6E1] file:text-[var(--wafu-text)] hover:file:bg-[#DCD6CD] transition-colors border border-[var(--wafu-border)] rounded-sm bg-white p-1">
                        </div>
                        <button type="button" id="importBtn" onclick="handleImportGrades()" class="w-full flex justify-center items-center py-3 btn-wafu tracking-wider">
                            <span id="importBtnText">上傳 / 覆寫成績</span>
                            <div id="importSpinner" class="hidden ml-2 loader border-2 border-white rounded-full w-4 h-4"></div>
                        </button>
                    </div>
                </div>

                <!-- 評量紀錄管理功能 (修改名稱/刪除) -->
                <div class="bg-[#FCFBFA] p-6 rounded border border-[var(--wafu-border)]">
                    <h3 class="font-bold text-lg mb-4 serif-font border-l-4 pl-3" style="border-color: var(--wafu-accent);">
                        <i class="fas fa-tasks mr-2 text-sm"></i>4. 評量紀錄管理 (修改名稱 / 刪除)
                    </h3>
                    <div class="space-y-4">
                        <select id="manageAssessmentSelect" class="w-full px-3 py-2 wafu-input appearance-none">
                            <option value="" disabled selected>載入中...</option>
                        </select>
                        <div class="flex space-x-3">
                            <button type="button" onclick="openRenameAssessmentModal()" class="w-1/2 flex justify-center items-center py-3 btn-wafu tracking-wider">
                                <i class="fas fa-pen mr-2"></i>修改名稱
                            </button>
                            <button type="button" id="deleteBtn" onclick="handleDeleteAssessment()" class="w-1/2 flex justify-center items-center py-3 btn-wafu-danger tracking-wider">
                                <span id="deleteBtnText"><i class="fas fa-trash-alt mr-2"></i>刪除評量</span>
                                <div id="deleteSpinner" class="hidden ml-2 loader border-2 border-white rounded-full w-4 h-4"></div>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 修改密碼功能 -->
                <div class="bg-[#FCFBFA] p-6 rounded border border-[var(--wafu-border)]">
                    <h3 class="font-bold text-lg mb-4 serif-font border-l-4 pl-3" style="border-color: #A9A9A9;">
                        <i class="fas fa-user-lock mr-2 text-sm"></i>5. 修改管理員密碼
                    </h3>
                    <div class="space-y-4">
                        <input type="password" id="newAdminPwd" placeholder="輸入新密碼" class="w-full px-3 py-2 wafu-input">
                        <button type="button" id="changePwdBtn" onclick="handleChangeAdminPwd()" class="w-full flex justify-center items-center py-3 bg-gray-600 hover:bg-gray-700 text-white rounded-sm transition-colors tracking-wider">
                            <span id="changePwdBtnText">確認修改密碼</span>
                            <div id="changePwdSpinner" class="hidden ml-2 loader border-2 border-white rounded-full w-4 h-4"></div>
                        </button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Toast & Modals... -->
    <div id="toast" class="fixed bottom-5 right-5 transform translate-y-20 opacity-0 transition-all duration-400 z-50 flex items-center p-4 mb-4 rounded-sm shadow-xl border border-[var(--wafu-border)]" style="background-color: rgba(255,255,255,0.95); backdrop-filter: blur(4px);">
        <div id="toastIcon" class="inline-flex flex-shrink-0 justify-center items-center w-8 h-8 rounded-full"><i class="fas fa-info-circle"></i></div>
        <div id="toastMessage" class="ml-3 text-sm font-medium tracking-wide text-gray-800 pr-2">訊息</div>
    </div>

    <div id="statsModal" class="fixed inset-0 z-[100] hidden" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <div class="fixed inset-0 bg-[#3E3A39] bg-opacity-40 backdrop-blur-sm transition-opacity" onclick="closeStatsModal()"></div>
        <div class="fixed inset-0 z-10 w-screen overflow-y-auto">
            <div class="flex min-h-full items-end justify-center p-4 text-center sm:items-center sm:p-0">
                <div class="relative transform overflow-hidden rounded-sm bg-[#FCFBFA] text-left shadow-2xl transition-all sm:my-8 sm:w-full sm:max-w-sm fade-in border border-[var(--wafu-border)]">
                    <div class="px-4 pb-4 pt-5 sm:p-6 sm:pb-4 border-b border-[var(--wafu-border)]">
                        <h3 class="text-xl font-bold leading-6 text-[var(--wafu-text)] serif-font text-center" id="modalSubjectTitle">科目統計</h3>
                    </div>
                    <div class="px-6 py-4">
                        <p class="text-sm font-bold text-[var(--wafu-primary)] mb-3 text-center tracking-widest" id="modalAverage">全班平均：-- 分</p>
                        <div class="overflow-hidden border border-[var(--wafu-border)]">
                            <table class="min-w-full divide-y divide-[var(--wafu-border)] text-sm">
                                <thead class="bg-[#F5F4F0]">
                                    <tr>
                                        <th class="px-4 py-2 text-left font-medium text-gray-600 tracking-widest">區間</th>
                                        <th class="px-4 py-2 text-right font-medium text-gray-600 tracking-widest">人數</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-[var(--wafu-border)] bg-white" id="modalDistBody"></tbody>
                            </table>
                        </div>
                    </div>
                    <div class="bg-[#F5F4F0] px-4 py-3 sm:flex sm:flex-row-reverse sm:px-6">
                        <button type="button" onclick="closeStatsModal()" class="w-full inline-flex justify-center rounded-sm bg-white px-4 py-2 text-sm font-medium text-gray-700 shadow-sm ring-1 ring-inset ring-[var(--wafu-border)] hover:bg-gray-50 transition-colors tracking-widest">關 閉</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 學生資料編輯視窗 (Modal) -->
    <div id="studentEditModal" class="fixed inset-0 z-[100] hidden" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <div class="fixed inset-0 bg-[#3E3A39] bg-opacity-40 backdrop-blur-sm transition-opacity" onclick="closeStudentModal()"></div>
        <div class="fixed inset-0 z-10 w-screen overflow-y-auto">
            <div class="flex min-h-full items-center justify-center p-4 text-center sm:p-0">
                <div class="relative transform overflow-hidden rounded-sm bg-[#FCFBFA] text-left shadow-2xl transition-all sm:my-8 sm:w-full sm:max-w-sm fade-in border border-[var(--wafu-border)]">
                    <div class="px-4 pb-4 pt-5 sm:p-6 sm:pb-4 border-b border-[var(--wafu-border)]">
                        <h3 class="text-xl font-bold leading-6 text-[var(--wafu-text)] serif-font text-center" id="studentModalTitle">編輯學生資料</h3>
                    </div>
                    <div class="px-6 py-4 space-y-4">
                        <input type="hidden" id="editStudentOriginalPwd">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">密碼 (登入用)*</label>
                            <input type="text" id="editStudentPwd" class="w-full px-3 py-2 wafu-input" required>
                            <p class="text-[11px] text-[var(--wafu-accent)] mt-1 tracking-wide">注意：修改密碼會導致該生無法查詢舊成績</p>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">座號</label>
                            <input type="text" id="editStudentSeat" class="w-full px-3 py-2 wafu-input">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">姓名</label>
                            <input type="text" id="editStudentName" class="w-full px-3 py-2 wafu-input">
                        </div>
                    </div>
                    <div class="bg-[#F5F4F0] px-4 py-3 sm:flex sm:flex-row-reverse sm:px-6">
                        <button type="button" onclick="saveStudent()" id="saveStudentBtn" class="w-full inline-flex justify-center rounded-sm bg-[var(--wafu-primary)] px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-[var(--wafu-primary-hover)] sm:ml-3 sm:w-auto tracking-widest transition-colors">儲 存</button>
                        <button type="button" onclick="closeStudentModal()" class="mt-3 w-full inline-flex justify-center rounded-sm bg-white px-4 py-2 text-sm font-medium text-gray-700 shadow-sm ring-1 ring-inset ring-[var(--wafu-border)] hover:bg-gray-50 sm:mt-0 sm:w-auto tracking-widest transition-colors">取 消</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 修改評量名稱視窗 (Modal) -->
    <div id="renameAssessmentModal" class="fixed inset-0 z-[100] hidden" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <div class="fixed inset-0 bg-[#3E3A39] bg-opacity-40 backdrop-blur-sm transition-opacity" onclick="closeRenameAssessmentModal()"></div>
        <div class="fixed inset-0 z-10 w-screen overflow-y-auto">
            <div class="flex min-h-full items-center justify-center p-4 text-center sm:p-0">
                <div class="relative transform overflow-hidden rounded-sm bg-[#FCFBFA] text-left shadow-2xl transition-all sm:my-8 sm:w-full sm:max-w-sm fade-in border border-[var(--wafu-border)]">
                    <div class="px-4 pb-4 pt-5 sm:p-6 sm:pb-4 border-b border-[var(--wafu-border)]">
                        <h3 class="text-xl font-bold leading-6 text-[var(--wafu-text)] serif-font text-center">修改評量名稱</h3>
                    </div>
                    <div class="px-6 py-4 space-y-4">
                        <input type="hidden" id="renameOldName">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">新評量名稱</label>
                            <input type="text" id="renameNewName" class="w-full px-3 py-2 wafu-input" required>
                        </div>
                    </div>
                    <div class="bg-[#F5F4F0] px-4 py-3 sm:flex sm:flex-row-reverse sm:px-6">
                        <button type="button" onclick="saveRenameAssessment()" id="saveRenameBtn" class="w-full inline-flex justify-center rounded-sm bg-[var(--wafu-primary)] px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-[var(--wafu-primary-hover)] sm:ml-3 sm:w-auto tracking-widest transition-colors">
                            <span id="saveRenameBtnText">儲 存</span>
                            <div id="saveRenameSpinner" class="hidden ml-2 loader border-2 border-white rounded-full w-4 h-4"></div>
                        </button>
                        <button type="button" onclick="closeRenameAssessmentModal()" class="mt-3 w-full inline-flex justify-center rounded-sm bg-white px-4 py-2 text-sm font-medium text-gray-700 shadow-sm ring-1 ring-inset ring-[var(--wafu-border)] hover:bg-gray-50 sm:mt-0 sm:w-auto tracking-widest transition-colors">取 消</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase 整合腳本 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, getDocs, collection, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let db, auth, appId, userDocId;
        let isFirebaseReady = false;
        
        let currentUserInfo = null; 
        let currentRole = null; 
        let currentStats = null; 

        // ==========================================
        // 1. 初始化 Firebase
        // ==========================================
        async function initSystem() {
            try {
                        const firebaseConfig = {
  apiKey: "AIzaSyCOv3fRkben0ycq6hQJulwMhkbON8fxLxI",
  authDomain: "grades-2421f.firebaseapp.com",
  projectId: "grades-2421f",
  storageBucket: "grades-2421f.firebasestorage.app",
  messagingSenderId: "952321148582",
  appId: "1:952321148582:web:f932a627c0bd24a440d667"
};

                appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);

                // Auth 監聽器
                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        isFirebaseReady = true;
                        document.getElementById('subtitle').textContent = '請輸入個人密碼以登入系統';
                        document.getElementById('loginForm').classList.remove('hidden');
                        await ensureSystemDocs(); // 確保資料庫結構存在
                    }
                });

                // Rule 3: 登入匿名驗證
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Firebase Initialization Failed:", error);
                document.getElementById('subtitle').textContent = '系統連線失敗，請重整頁面。';
            }
        }

        const configRef = () => doc(db, 'artifacts', appId, 'public', 'data', 'system', 'config');
        const rosterRef = () => doc(db, 'artifacts', appId, 'public', 'data', 'system', 'roster');
        const assessmentsCol = () => collection(db, 'artifacts', appId, 'public', 'data', 'assessments');
        const assessmentRef = (name) => doc(db, 'artifacts', appId, 'public', 'data', 'assessments', name);

        async function ensureSystemDocs() {
            try {
                const cSnap = await getDoc(configRef());
                if (!cSnap.exists()) await setDoc(configRef(), { adminPassword: 'admin' });
                const rSnap = await getDoc(rosterRef());
                if (!rSnap.exists()) await setDoc(rosterRef(), { students: [] });
            } catch (e) {
                console.error("Error verifying docs", e);
            }
        }

        // ==========================================
        // 2. 登入邏輯
        // ==========================================
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if(!isFirebaseReady) return showToast('系統連線中，請稍後', 'warning');
            
            const pwd = document.getElementById('password').value.trim();
            if (!pwd) return showToast('請輸入密碼', 'warning');

            toggleBtn('loginBtn', 'loginBtnText', 'loginSpinner', true, '驗證中...');

            try {
                const configSnap = await getDoc(configRef());
                const adminPwd = configSnap.exists() ? configSnap.data().adminPassword : 'admin';

                if (pwd === adminPwd) {
                    // 管理員登入
                    currentRole = 'admin';
                    document.getElementById('loginForm').classList.add('hidden');
                    document.getElementById('subtitle').textContent = '系統管理後台';
                    document.getElementById('adminSection').classList.remove('hidden');
                    await loadAssessmentsToDropdown('manageAssessmentSelect');
                    await window.loadAdminRoster(); // 載入學生名冊
                    showToast('管理員登入成功', 'success');
                } else {
                    // 學生登入
                    const rosterSnap = await getDoc(rosterRef());
                    const students = rosterSnap.exists() ? rosterSnap.data().students : [];
                    const studentInfo = students.find(s => s['密碼'] === pwd || s.password === pwd);

                    if (studentInfo) {
                        currentRole = 'student';
                        currentUserInfo = { pwd, ...studentInfo };
                        document.getElementById('loginForm').classList.add('hidden');
                        document.getElementById('subtitle').textContent = '請選擇要查詢的評量項目';
                        document.getElementById('resSeat').textContent = `座號：${studentInfo['座號'] || studentInfo.seat || '--'}`;
                        document.getElementById('resName').textContent = studentInfo['姓名'] || studentInfo.name || '--';
                        
                        await loadAssessmentsToDropdown('assessment');
                        document.getElementById('studentSection').classList.remove('hidden');
                        showToast('登入成功', 'success');
                    } else {
                        showToast('密碼錯誤或找不到學生資料', 'error');
                    }
                }
            } catch (error) {
                console.error(error);
                showToast('系統發生錯誤', 'error');
            } finally {
                toggleBtn('loginBtn', 'loginBtnText', 'loginSpinner', false, '登 入');
            }
        });

        // 載入評量列表
        async function loadAssessmentsToDropdown(selectId) {
            const select = document.getElementById(selectId);
            select.innerHTML = '<option value="" disabled selected>請選擇...</option>';
            const snapshot = await getDocs(assessmentsCol());
            
            // 將取得的資料放入陣列中，以便進行記憶體排序
            let assessments = [];
            snapshot.forEach(doc => {
                assessments.push({
                    id: doc.id,
                    updatedAt: doc.data().updatedAt || 0 // 舊資料預設為0
                });
            });
            
            // 依時間戳記遞減排序 (最新新增的排在最上面)
            assessments.sort((a, b) => b.updatedAt - a.updatedAt);
            
            assessments.forEach(item => {
                const option = document.createElement('option');
                option.value = item.id;
                option.textContent = item.id;
                select.appendChild(option);
            });
        }

        // ==========================================
        // 3. 學生查詢成績
        // ==========================================
        document.getElementById('queryForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const sheetName = document.getElementById('assessment').value;
            if (!sheetName) return showToast('請選擇評量', 'warning');

            toggleBtn('queryBtn', 'queryBtnText', 'querySpinner', true, '查詢中...');
            document.getElementById('resultArea').classList.add('hidden');

            try {
                const snap = await getDoc(assessmentRef(sheetName));
                if (!snap.exists()) throw new Error('找不到此成績資料');

                const records = snap.data().records || [];
                const myGrade = records.find(r => r['密碼'] === currentUserInfo.pwd || r.password === currentUserInfo.pwd);

                if (!myGrade) throw new Error('該次評量找不到您的資料');

                // 計算全班統計
                currentStats = calculateStats(records);
                renderGrades(myGrade);
                showToast('查詢完成', 'success');
            } catch (error) {
                showToast(error.message, 'error');
            } finally {
                toggleBtn('queryBtn', 'queryBtnText', 'querySpinner', false, '查詢成績');
            }
        });

        function calculateStats(records) {
            let stats = {};
            if (records.length === 0) return stats;
            const subjects = Object.keys(records[0]).filter(k => !['密碼','座號','姓名','總分','平均'].includes(k));
            
            subjects.forEach(subj => {
                stats[subj] = { sum: 0, count: 0, dist: { "100": 0, "90-99": 0, "80-89": 0, "70-79": 0, "60-69": 0, "未滿60": 0 } };
            });

            records.forEach(row => {
                subjects.forEach(subj => {
                    const val = row[subj];
                    if (typeof val === 'number' && !isNaN(val)) {
                        let stat = stats[subj];
                        stat.sum += val;
                        stat.count += 1;
                        if (val >= 100) stat.dist["100"]++;
                        else if (val >= 90) stat.dist["90-99"]++;
                        else if (val >= 80) stat.dist["80-89"]++;
                        else if (val >= 70) stat.dist["70-79"]++;
                        else if (val >= 60) stat.dist["60-69"]++;
                        else stat.dist["未滿60"]++;
                    }
                });
            });

            for (let subj in stats) {
                stats[subj].average = stats[subj].count > 0 ? (stats[subj].sum / stats[subj].count).toFixed(1) : "--";
            }
            return stats;
        }

        function renderGrades(grades) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            const subjects = Object.keys(grades).filter(s => !['密碼','座號','姓名','總分','平均'].includes(s));
            
            subjects.forEach(subject => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-[#FCFBFA] transition-colors';
                
                const tdSub = document.createElement('td');
                tdSub.className = 'px-6 py-4 text-center text-sm font-medium text-[var(--wafu-text)] border-r border-[var(--wafu-border)] bg-[#FDFDFC]';
                tdSub.textContent = subject;

                const tdScore = document.createElement('td');
                tdScore.className = 'px-6 py-4 text-center text-sm font-bold tracking-widest';
                const score = grades[subject];

                if (!isNaN(score) && score !== "" && score !== null) {
                    const hasStats = currentStats && currentStats[subject];
                    let scoreHtml = Number(score) < 60 ? `<span class="text-[var(--wafu-accent)]">${score}</span>` : `<span class="text-[var(--wafu-primary)]">${score}</span>`;

                    if (hasStats) {
                        tdScore.innerHTML = `<button onclick="window.showStatsModal('${subject}')" class="focus:outline-none hover:opacity-70 transition-opacity pb-1 border-b border-dashed border-gray-300" title="點擊查看全班統計">${scoreHtml} <i class="fas fa-hand-pointer text-[10px] ml-1 text-gray-400"></i></button>`;
                    } else {
                        tdScore.innerHTML = scoreHtml;
                    }
                } else {
                    tdScore.textContent = score || '--';
                }

                tr.appendChild(tdSub);
                tr.appendChild(tdScore);
                tbody.appendChild(tr);
            });
            document.getElementById('resultArea').classList.remove('hidden');
        }

        // ==========================================
        // 4. 管理員功能綁定至 window (以便 html 呼叫)
        // ==========================================
        window.handleImportRoster = async () => {
            const fileInput = document.getElementById('rosterCsvFile');
            if (fileInput.files.length === 0) return showToast('請選擇 CSV 檔案', 'warning');
            
            toggleBtn('importRosterBtn', 'importRosterBtnText', 'importRosterSpinner', true, '處理中...');
            try {
                const data = await readCSVFile(fileInput.files[0]);
                if (!data || data.length === 0 || !data[0]['密碼']) throw new Error('名冊必須包含 [密碼] 欄位');
                
                // 強制將密碼轉為字串
                const students = data.map(d => ({ ...d, '密碼': String(d['密碼']) }));
                await setDoc(rosterRef(), { students });
                
                await window.loadAdminRoster(); // 更新學生名冊列表
                showToast('學生名冊匯入成功！', 'success');
                fileInput.value = '';
            } catch (error) {
                showToast('匯入失敗: ' + error.message, 'error');
            } finally {
                toggleBtn('importRosterBtn', 'importRosterBtnText', 'importRosterSpinner', false, '上傳 / 覆寫名冊');
            }
        };

        window.handleImportGrades = async () => {
            const name = document.getElementById('importSheetName').value.trim();
            const fileInput = document.getElementById('csvFile');
            if (!name) return showToast('請填寫評量名稱', 'warning');
            if (fileInput.files.length === 0) return showToast('請選擇 CSV 檔案', 'warning');
            
            toggleBtn('importBtn', 'importBtnText', 'importSpinner', true, '處理中...');
            try {
                let data = await readCSVFile(fileInput.files[0]);
                if (!data || data.length === 0 || !data[0]['密碼']) throw new Error('成績單必須包含 [密碼] 欄位');
                
                // 將成績欄位轉為數字，密碼維持字串
                data = data.map(row => {
                    let newRow = {};
                    for (let key in row) {
                        if (key === '密碼' || key === '座號' || key === '姓名') {
                            newRow[key] = String(row[key]);
                        } else {
                            newRow[key] = (row[key] !== '' && !isNaN(row[key])) ? Number(row[key]) : row[key];
                        }
                    }
                    return newRow;
                });

                await setDoc(assessmentRef(name), { 
                    records: data,
                    updatedAt: Date.now() // 加入時間戳記供選單排序
                });
                showToast(`成績 [${name}] 匯入成功！`, 'success');
                fileInput.value = '';
                document.getElementById('importSheetName').value = '';
                await loadAssessmentsToDropdown('manageAssessmentSelect');
            } catch (error) {
                showToast('匯入失敗: ' + error.message, 'error');
            } finally {
                toggleBtn('importBtn', 'importBtnText', 'importSpinner', false, '上傳 / 覆寫成績');
            }
        };

        window.handleDeleteAssessment = async () => {
            const name = document.getElementById('manageAssessmentSelect').value;
            if (!name) return showToast('請選擇評量', 'warning');
            if (!confirm(`確定要永久刪除 [${name}] 嗎？`)) return;

            toggleBtn('deleteBtn', 'deleteBtnText', 'deleteSpinner', true, '刪除中...');
            try {
                await deleteDoc(assessmentRef(name));
                showToast('刪除成功', 'success');
                await loadAssessmentsToDropdown('manageAssessmentSelect');
            } catch(e) {
                showToast('刪除失敗', 'error');
            } finally {
                toggleBtn('deleteBtn', 'deleteBtnText', 'deleteSpinner', false, '刪除評量');
            }
        };

        window.openRenameAssessmentModal = () => {
            const oldName = document.getElementById('manageAssessmentSelect').value;
            if (!oldName) return showToast('請先選擇要修改的評量', 'warning');
            
            document.getElementById('renameOldName').value = oldName;
            document.getElementById('renameNewName').value = oldName;
            document.getElementById('renameAssessmentModal').classList.remove('hidden');
        };

        window.closeRenameAssessmentModal = () => {
            document.getElementById('renameAssessmentModal').classList.add('hidden');
        };

        window.saveRenameAssessment = async () => {
            const oldName = document.getElementById('renameOldName').value;
            const newName = document.getElementById('renameNewName').value.trim();

            if (!newName) return showToast('請輸入新名稱', 'warning');
            if (oldName === newName) return window.closeRenameAssessmentModal(); // 若沒改名則直接關閉

            toggleBtn('saveRenameBtn', 'saveRenameBtnText', 'saveRenameSpinner', true, '儲存中...');
            
            try {
                // 1. 檢查新名稱是否已存在，防止意外覆蓋
                const newSnap = await getDoc(assessmentRef(newName));
                if (newSnap.exists()) {
                    showToast(`名稱 [${newName}] 已存在，請換一個名稱`, 'warning');
                    return;
                }

                // 2. 讀取舊的成績資料
                const oldSnap = await getDoc(assessmentRef(oldName));
                if (!oldSnap.exists()) throw new Error('舊評量紀錄已不存在');
                const oldData = oldSnap.data();

                // 3. 將資料寫入新的文件 ID，然後刪除舊的 (更新時間戳記確保排在最上方)
                await setDoc(assessmentRef(newName), { ...oldData, updatedAt: Date.now() });
                await deleteDoc(assessmentRef(oldName));

                showToast('評量名稱修改成功', 'success');
                window.closeRenameAssessmentModal();
                await loadAssessmentsToDropdown('manageAssessmentSelect'); // 刷新選單
            } catch (error) {
                console.error(error);
                showToast('修改名稱失敗', 'error');
            } finally {
                toggleBtn('saveRenameBtn', 'saveRenameBtnText', 'saveRenameSpinner', false, '儲 存');
            }
        };

        // ==========================================
        // 7. 編輯評量細項 (刪除欄/列)
        // ==========================================
        let editingAssessmentData = [];
        let editingAssessmentKeys = [];

        window.openEditAssessmentModal = async () => {
            const name = document.getElementById('manageAssessmentSelect').value;
            if (!name) return showToast('請先選擇要編輯的評量', 'warning');
            
            document.getElementById('editAssessmentName').value = name;
            document.getElementById('editModalTitle').textContent = `編輯：${name}`;
            
            const originalBtnText = document.getElementById('deleteBtnText').innerHTML;
            toggleBtn('deleteBtn', 'deleteBtnText', 'deleteSpinner', true, '讀取中...');
            
            try {
                const snap = await getDoc(assessmentRef(name));
                if (!snap.exists()) throw new Error('資料不存在');
                
                // 深拷貝資料以供編輯
                editingAssessmentData = JSON.parse(JSON.stringify(snap.data().records || []));
                
                if (editingAssessmentData.length > 0) {
                     let keysSet = new Set();
                     editingAssessmentData.forEach(r => Object.keys(r).forEach(k => keysSet.add(k)));
                     editingAssessmentKeys = Array.from(keysSet);
                     
                     // 確保「密碼」永遠固定在第一欄
                     const pwdIdx = editingAssessmentKeys.indexOf('密碼');
                     if (pwdIdx > -1) {
                         editingAssessmentKeys.splice(pwdIdx, 1);
                         editingAssessmentKeys.unshift('密碼');
                     }
                } else {
                     editingAssessmentKeys = ['密碼'];
                }
                
                window.renderAssessmentEditor();
                document.getElementById('editAssessmentModal').classList.remove('hidden');
            } catch (error) {
                showToast('讀取資料失敗', 'error');
            } finally {
                toggleBtn('deleteBtn', 'deleteBtnText', 'deleteSpinner', false, '');
                document.getElementById('deleteBtnText').innerHTML = originalBtnText; // 恢復按鈕文字
            }
        };

        window.renderAssessmentEditor = () => {
            const thead = document.getElementById('editAssessmentThead');
            const tbody = document.getElementById('editAssessmentTbody');
            
            // 繪製表頭 (包含刪除科目按鈕)
            let thHtml = '<tr>';
            editingAssessmentKeys.forEach((key) => {
                if (key !== '密碼' && key !== '姓名' && key !== '座號' && key !== '總分' && key !== '平均') {
                     thHtml += `<th class="px-3 py-3 text-center font-bold text-gray-700 whitespace-nowrap bg-[#E8E6E1] border-r border-[var(--wafu-border)]">
                                  <div class="flex items-center justify-between space-x-3">
                                      <span>${key}</span>
                                      <button onclick="window.deleteAssessmentColumn('${key}')" class="text-[var(--wafu-accent)] hover:opacity-70 transition-opacity" title="刪除此科目所有成績"><i class="fas fa-times-circle"></i></button>
                                  </div>
                                </th>`;
                } else {
                     thHtml += `<th class="px-3 py-3 text-center font-bold text-gray-700 whitespace-nowrap bg-[#F5F4F0] border-r border-[var(--wafu-border)]">${key}</th>`;
                }
            });
            thHtml += `<th class="px-3 py-3 text-center font-bold text-[var(--wafu-accent)] bg-[#F5F4F0]">操作</th></tr>`;
            thead.innerHTML = thHtml;
            
            // 繪製內容 (包含刪除該生紀錄按鈕)
            tbody.innerHTML = '';
            if (editingAssessmentData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="${editingAssessmentKeys.length + 1}" class="text-center py-6 text-gray-500">尚無成績資料</td></tr>`;
                return;
            }
            
            editingAssessmentData.forEach((row, rowIndex) => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-[#FDFDFC] transition-colors';
                let tdHtml = '';
                editingAssessmentKeys.forEach(key => {
                     let cellVal = row[key] !== undefined ? row[key] : '';
                     tdHtml += `<td class="px-3 py-3 text-center text-gray-800 whitespace-nowrap border-r border-[var(--wafu-border)]">${cellVal}</td>`;
                });
                tdHtml += `<td class="px-3 py-3 text-center whitespace-nowrap">
                             <button onclick="window.deleteAssessmentRow(${rowIndex})" class="text-[var(--wafu-accent)] hover:opacity-70 px-2 py-1 rounded border border-[var(--wafu-accent)] text-xs transition-colors" title="刪除此學生紀錄"><i class="fas fa-trash-alt mr-1"></i>刪除列</button>
                           </td>`;
                tr.innerHTML = tdHtml;
                tbody.appendChild(tr);
            });
        };

        window.deleteAssessmentColumn = (colKey) => {
            if(!confirm(`⚠️ 確定要刪除「${colKey}」這個科目的所有成績嗎？\n(刪除後需按下右下方的「儲存變更」才會永久生效)`)) return;
            editingAssessmentKeys = editingAssessmentKeys.filter(k => k !== colKey);
            editingAssessmentData.forEach(row => { delete row[colKey]; });
            window.renderAssessmentEditor();
        };

        window.deleteAssessmentRow = (rowIndex) => {
            const pwd = editingAssessmentData[rowIndex]['密碼'] || '此學生';
            if(!confirm(`確定要從這次評量中刪除「密碼: ${pwd}」的成績紀錄嗎？`)) return;
            editingAssessmentData.splice(rowIndex, 1);
            window.renderAssessmentEditor();
        };

        window.closeEditAssessmentModal = () => {
            document.getElementById('editAssessmentModal').classList.add('hidden');
        };

        window.saveEditedAssessment = async () => {
            const name = document.getElementById('editAssessmentName').value;
            toggleBtn('saveEditedBtn', 'saveEditedBtnText', 'saveEditedSpinner', true, '儲存中...');
            
            try {
                const snap = await getDoc(assessmentRef(name));
                let docData = snap.exists() ? snap.data() : {};
                
                docData.records = editingAssessmentData;
                docData.updatedAt = Date.now(); 
                
                await setDoc(assessmentRef(name), docData);
                showToast('評量成績明細已成功更新！', 'success');
                window.closeEditAssessmentModal();
            } catch (error) {
                showToast('儲存失敗', 'error');
            } finally {
                toggleBtn('saveEditedBtn', 'saveEditedBtnText', 'saveEditedSpinner', false, '儲 存 變 更');
            }
        };

        window.handleChangeAdminPwd = async () => {
            const newPwd = document.getElementById('newAdminPwd').value.trim();
            if (!newPwd) return showToast('請輸入新密碼', 'warning');
            
            toggleBtn('changePwdBtn', 'changePwdBtnText', 'changePwdSpinner', true, '處理中...');
            try {
                await setDoc(configRef(), { adminPassword: newPwd }, { merge: true });
                showToast('管理員密碼修改成功！', 'success');
                document.getElementById('newAdminPwd').value = '';
            } catch(e) {
                showToast('修改失敗', 'error');
            } finally {
                toggleBtn('changePwdBtn', 'changePwdBtnText', 'changePwdSpinner', false, '確認修改密碼');
            }
        };

        // CSV Parser
        function readCSVFile(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = e => {
                    try {
                        const lines = e.target.result.split(/\r\n|\n/).filter(line => line.trim() !== '');
                        if(lines.length < 2) return resolve([]);
                        const headers = lines[0].split(',').map(c => c.trim().replace(/^"|"$/g, ''));
                        const result = lines.slice(1).map(line => {
                            const cells = line.split(',').map(c => c.trim().replace(/^"|"$/g, ''));
                            let obj = {};
                            headers.forEach((h, i) => obj[h] = cells[i] || '');
                            return obj;
                        });
                        resolve(result);
                    } catch(err) { reject(err); }
                };
                reader.onerror = () => reject(new Error('檔案讀取失敗'));
                reader.readAsText(file, 'UTF-8');
            });
        }

        // ==========================================
        // 5. UI 共用功能綁定至 window
        // ==========================================
        window.logout = () => {
            currentRole = null;
            currentUserInfo = null;
            document.getElementById('password').value = '';
            document.getElementById('studentSection').classList.add('hidden');
            document.getElementById('adminSection').classList.add('hidden');
            document.getElementById('resultArea').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('subtitle').textContent = '請輸入個人密碼以登入系統';
            showToast('已登出系統', 'info');
        };

        window.showStatsModal = (subject) => {
            if (!currentStats || !currentStats[subject]) return;
            const stats = currentStats[subject];
            document.getElementById('modalSubjectTitle').textContent = `「${subject}」分析`;
            document.getElementById('modalAverage').textContent = `全班平均：${stats.average} 分`;
            
            const distBody = document.getElementById('modalDistBody');
            distBody.innerHTML = '';
            const ranges = ['100', '90-99', '80-89', '70-79', '60-69', '未滿60'];
            let total = 0;
            
            ranges.forEach(range => {
                const count = stats.dist[range] || 0;
                total += count;
                let rText = range === '100' ? '100 分' : (range === '未滿60' ? '未滿 60 分' : `${range} 分`);
                distBody.innerHTML += `
                    <tr class="hover:bg-[#FCFBFA]">
                        <td class="px-4 py-3 text-left text-gray-700 font-medium">${rText}</td>
                        <td class="px-4 py-3 text-right font-bold text-[var(--wafu-primary)]">${count} 人</td>
                    </tr>`;
            });
            distBody.innerHTML += `
                <tr class="bg-[#F5F4F0] border-t border-[var(--wafu-border)]">
                    <td class="px-4 py-3 text-left font-bold text-gray-800">總計</td>
                    <td class="px-4 py-3 text-right font-bold text-gray-800">${total} 人</td>
                </tr>`;
            document.getElementById('statsModal').classList.remove('hidden');
        };

        window.closeStatsModal = () => document.getElementById('statsModal').classList.add('hidden');

        // ==========================================
        // 6. 學生基本資料管理邏輯
        // ==========================================
        let adminRosterCache = [];

        window.loadAdminRoster = async () => {
            try {
                const rSnap = await getDoc(rosterRef());
                adminRosterCache = rSnap.exists() ? (rSnap.data().students || []) : [];
                window.renderAdminRoster();
            } catch(e) {
                console.error("載入名冊失敗", e);
            }
        };

        window.renderAdminRoster = () => {
            const tbody = document.getElementById('adminStudentList');
            tbody.innerHTML = '';
            if(adminRosterCache.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center py-4 text-gray-500">尚無學生資料</td></tr>';
                return;
            }
            adminRosterCache.forEach((s, idx) => {
                const pwd = s['密碼'] || s.password;
                const seat = s['座號'] || s.seat || '';
                const name = s['姓名'] || s.name || '';
                
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-[#FDFDFC] transition-colors';
                tr.innerHTML = `
                    <td class="px-4 py-2 text-gray-800">${pwd}</td>
                    <td class="px-4 py-2 text-gray-600">${seat}</td>
                    <td class="px-4 py-2 text-gray-800">${name}</td>
                    <td class="px-4 py-2 text-center whitespace-nowrap">
                        <button onclick="window.openStudentModal(${idx})" class="text-blue-500 hover:text-blue-700 mr-3" title="編輯"><i class="fas fa-edit"></i></button>
                        <button onclick="window.deleteStudent(${idx})" class="text-[var(--wafu-accent)] hover:opacity-70" title="刪除"><i class="fas fa-trash-alt"></i></button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        };

        window.openStudentModal = (index = -1) => {
            const title = document.getElementById('studentModalTitle');
            if (index >= 0) {
                title.textContent = '編輯學生資料';
                const s = adminRosterCache[index];
                document.getElementById('editStudentOriginalPwd').value = s['密碼'] || s.password;
                document.getElementById('editStudentPwd').value = s['密碼'] || s.password;
                document.getElementById('editStudentSeat').value = s['座號'] || s.seat || '';
                document.getElementById('editStudentName').value = s['姓名'] || s.name || '';
            } else {
                title.textContent = '新增學生資料';
                document.getElementById('editStudentOriginalPwd').value = '';
                document.getElementById('editStudentPwd').value = '';
                document.getElementById('editStudentSeat').value = '';
                document.getElementById('editStudentName').value = '';
            }
            document.getElementById('studentEditModal').classList.remove('hidden');
        };

        window.closeStudentModal = () => document.getElementById('studentEditModal').classList.add('hidden');

        window.saveStudent = async () => {
            const origPwd = document.getElementById('editStudentOriginalPwd').value;
            const newPwd = document.getElementById('editStudentPwd').value.trim();
            const newSeat = document.getElementById('editStudentSeat').value.trim();
            const newName = document.getElementById('editStudentName').value.trim();

            if (!newPwd) return showToast('密碼為必填項目', 'warning');

            // 檢查是否有重複密碼
            if (origPwd !== newPwd) {
                const exists = adminRosterCache.find(s => (s['密碼'] || s.password) === newPwd);
                if (exists) return showToast('此密碼已被使用', 'error');
            }

            const btn = document.getElementById('saveStudentBtn');
            const ogText = btn.textContent;
            btn.disabled = true;
            btn.textContent = '處理中...';

            try {
                let updatedRoster = [...adminRosterCache];
                if (origPwd) { 
                    // 編輯模式
                    const idx = updatedRoster.findIndex(s => (s['密碼'] || s.password) === origPwd);
                    if (idx !== -1) updatedRoster[idx] = { '密碼': newPwd, '座號': newSeat, '姓名': newName };
                } else { 
                    // 新增模式
                    updatedRoster.push({ '密碼': newPwd, '座號': newSeat, '姓名': newName });
                }

                await setDoc(rosterRef(), { students: updatedRoster });
                adminRosterCache = updatedRoster;
                window.renderAdminRoster();
                window.closeStudentModal();
                showToast('學生資料儲存成功', 'success');
            } catch(e) {
                showToast('儲存失敗', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = ogText;
            }
        };

        window.deleteStudent = async (index) => {
            const s = adminRosterCache[index];
            const name = s['姓名'] || s.name || s['密碼'];
            if (!confirm(`確定要刪除學生「${name}」嗎？`)) return;

            try {
                const updatedRoster = adminRosterCache.filter((_, i) => i !== index);
                await setDoc(rosterRef(), { students: updatedRoster });
                adminRosterCache = updatedRoster;
                window.renderAdminRoster();
                showToast('已刪除學生資料', 'success');
            } catch(e) {
                showToast('刪除失敗', 'error');
            }
        };

        function toggleBtn(btnId, textId, spinnerId, isLoading, loadingText) {
            const btn = document.getElementById(btnId);
            const textSpan = document.getElementById(textId);
            const spinner = document.getElementById(spinnerId);
            btn.disabled = isLoading;
            textSpan.textContent = isLoading ? loadingText : (btn.dataset.og || textSpan.textContent);
            if(!btn.dataset.og) btn.dataset.og = textSpan.textContent;
            isLoading ? spinner.classList.remove('hidden') : spinner.classList.add('hidden');
        }

        let toastTimeout;
        window.showToast = (message, type = 'info') => {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toastIcon');
            document.getElementById('toastMessage').textContent = message;
            
            icon.className = 'inline-flex flex-shrink-0 justify-center items-center w-8 h-8 rounded-full text-white';
            if (type === 'success') {
                icon.classList.add('bg-[var(--wafu-primary)]');
                icon.innerHTML = '<i class="fas fa-check"></i>';
            } else if (type === 'error') {
                icon.classList.add('bg-[var(--wafu-accent)]');
                icon.innerHTML = '<i class="fas fa-times"></i>';
            } else {
                icon.classList.add('bg-gray-400');
                icon.innerHTML = '<i class="fas fa-exclamation"></i>';
            }

            toast.classList.remove('translate-y-20', 'opacity-0');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3500);
        };

        // 啟動系統
        initSystem();

    </script>
</body>
</html>
